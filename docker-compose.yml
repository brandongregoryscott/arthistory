services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/_spotify-data.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /home/brandon/arthistory/data:/data

  # cron:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.cron
  #   env_file: .env
  #   volumes:
  #     - /home/brandon/arthistory/data:/data

  tunnel:
    build:
      context: .
      dockerfile: Dockerfile.tunnel
    depends_on:
      - api
    volumes:
      - /home/brandon/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
    restart: always

volumes:
  data:
